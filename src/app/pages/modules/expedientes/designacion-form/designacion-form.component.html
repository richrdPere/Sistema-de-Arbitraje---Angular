@if(mostrarModal){
<div class="modal modal-open">
  <div class="modal-box bg-base-100 text-base-content rounded-2xl shadow-lg" [ngClass]="modalWidthClass">


    <!-- Header -->
    <div class="flex justify-between items-center border-b border-base-300 pb-2">
      <!-- <h3 class="text-2xl font-semibold">{{ modoEdicion ? 'Editar Expediente' : 'Crear Nuevo Expediente' }}</h3> -->
      <h3 class="text-xl font-semibold">
        Gestión de Partícipes y Árbitros -
        <!-- <span class="text-xl badge" [ngClass]="{
      'badge-info': expedienteSeleccionado?.tipo === 'Arbitraje de Emergencia',
      'badge-primary': expedienteSeleccionado?.tipo === 'Arbitraje Institucional',
      'badge-accent': expedienteSeleccionado?.tipo === 'Arbitraje Ad Hoc'
    }">
          {{ expedienteSeleccionado?.tipo }}
        </span> -->
      </h3>
      <button type="button" (click)="cerrarModal()" class="btn btn-sm btn-circle btn-ghost text-xl">✕</button>
    </div>


    <!-- FORMULARIO -->
    <!-- STEPPER -->
    <ul class="steps steps-horizontal  w-full mt-4">
      <li class="step cursor-pointer" [class.step-primary]="state.step >= 1" (click)="irAlPaso(1)">
        DEMANDANTES
      </li>

      <li class="step" [class.step-primary]="state.step >= 2" (click)="irAlPaso(2)">
        DEMANDADOS
      </li>

      <li class="step" [class.step-primary]="state.step >= 3" (click)="irAlPaso(3)">
        ARBITROS
      </li>

      <li class="step" [class.step-primary]="state.step >= 4" (click)="irAlPaso(4)">
        CONFIRMACION
      </li>
    </ul>

    <!-- BODY -->
    <div class="modal-body">

      <!-- STEP 1: DEMANDANTES -->
      <step-demandantes *ngIf="state.step === 1"></step-demandantes>

      <!-- STEP 2: DEMANDADOS -->
      <step-demandados *ngIf="state.step === 2"></step-demandados>

      <!-- STEP 3: ARBITROS -->
      <step-arbitros *ngIf="state.step === 3"></step-arbitros>

      <!-- STEP 4: CONFIRMACION -->
      <step-confirmacion *ngIf="state.step === 4"></step-confirmacion>
    </div>

    <!-- FOOTER -->
    <div class="flex justify-center items-center border-t border-base-300 pt-5 mt-6 gap-5">

      <!-- BACK -->
      <button class="btn btn-outline" (click)="prevStep()" [disabled]="state.step === 1">
        <i class="fa-solid fa-arrow-left"></i>
        Anterior
      </button>

      <!-- INFO -->
      <!-- <div class="text-sm text-base-content/60">
        Paso {{ state.step }} de 4
      </div> -->

      <!-- NEXT / SAVE -->
      @if(state.step < 4) { <button class="btn btn-primary" (click)="nextStep()">
        Siguiente
        <i class="fa-solid fa-arrow-right"></i>
        </button>
        }

        @if(state.step === 4) {
        <button class="btn btn-success" (click)="guardarDesignacion()">
          Finalizar Designación
        </button>
        }
    </div>
  </div>

  <!-- Fondo oscuro del modal -->
  <div class="modal-backdrop bg-black/40 " (click)="cerrarModal()"></div>

</div>
}
