@if (mostrarModal) {
<div class="modal modal-open">
  <div class="modal-box max-w-4xl bg-base-100 text-base-content rounded-2xl shadow-2xl p-8">

    <!-- Header -->
    <div class="flex justify-between items-center border-b border-base-300 pb-2">
      <h3 class="text-2xl font-semibold">{{ modoEdicion ? 'Editar Expediente' : 'Nuevo Expediente' }}</h3>
      <button type="button" (click)="cerrarModal()" class="btn btn-sm btn-circle btn-ghost text-xl">✕</button>
    </div>

    <!-- FORMULARIO -->
    <!-- STEPPER -->
    <ul class="steps steps-horizontal  w-full mt-4">
      <!-- STEP 1 -->
      <li class="step cursor-pointer" [class.step-primary]="currentStep >= 1" (click)="irAlPaso(1)">
        PERSONA
      </li>

      <!-- STEP 2 -->
      <li class="step" [class.step-primary]="currentStep >= 2" [class.cursor-pointer]="puedeIrAlPaso(2)"
        [class.opacity-50]="!puedeIrAlPaso(2)" (click)="irAlPaso(2)">
        EXPEDIENTE
      </li>

      <!-- STEP 3 -->
      <li class="step" [class.step-primary]="currentStep >= 3" [class.cursor-pointer]="puedeIrAlPaso(3)"
        [class.opacity-50]="!puedeIrAlPaso(3)" (click)="irAlPaso(3)">
        RESUMEN
      </li>
    </ul>

    <!-- BODY -->
    <div class="modal-body">

      <!-- STEP 1: PERSONA -->
      <step-persona *ngIf="currentStep === 1" (nextStep)="nextStep()"></step-persona>

      <!-- STEP 2: EXPEDIENTE -->
      <step-expediente *ngIf="currentStep === 2" (prevStep)="prevStep()" (nextStep)="nextStep()"></step-expediente>


      <!-- STEP 3: RESUMEN -->
      <step-resumen-exp *ngIf="currentStep === 3" (prevStep)="prevStep()" (resetStepper)="cerrarModal()"
        (expedienteGuardado)="onExpedienteGuardado()"></step-resumen-exp>

    </div>

  </div>

  <!-- Fondo oscuro del modal -->
  <div class="modal-backdrop bg-black/40 " (click)="cerrarModal()"></div>
</div>
}
