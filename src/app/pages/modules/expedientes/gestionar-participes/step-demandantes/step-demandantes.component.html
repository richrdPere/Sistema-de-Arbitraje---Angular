<section class="grid grid-cols-2 gap-6">

  <!-- ========================= -->
  <!-- DISPONIBLES -->
  <!-- ========================= -->
  <div>
    <h3 class="font-semibold mb-2">Demandantes disponibles</h3>

    <div *ngIf="loading">Cargando...</div>

    <div *ngFor="let p of demandantesDisponibles"
         class="border p-2 mb-2 flex justify-between items-center rounded">

      <div>
        {{ p.nombres }} {{ p.apellidos }}
      </div>

      <button
        class="bg-blue-500 text-white px-2 py-1 rounded"
        (click)="agregar(p)">
        Agregar
      </button>

    </div>
  </div>

  <!-- ========================= -->
  <!-- SELECCIONADOS -->
  <!-- ========================= -->
  <div>
    <h3 class="font-semibold mb-2">Seleccionados</h3>

    <div *ngIf="seleccionados.length === 0" class="text-gray-500">
      No hay demandantes agregados
    </div>

    <div *ngFor="let d of seleccionados; let i = index"
         class="border p-2 mb-2 flex justify-between items-center rounded">

      <div>
        {{ d.nombres }} {{ d.apellidos }}
      </div>

      <button
        class="bg-red-500 text-white px-2 py-1 rounded"
        (click)="quitar(i)">
        Quitar
      </button>

    </div>
  </div>

</section>
